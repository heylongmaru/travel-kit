<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2c6e7f">
<title>出國旅遊小工具 Travel Kit</title>
<style>
/* ============ 內嵌 _design-system/design-system.css v1（工作區共用） ============ */
:root{
  --ink:#1f2a33; --text:#2a3340; --muted:#6b7683; --line:#dbe1df;
  --bg:#eef1ef; --card:#ffffff;
  --accent:#2c6e7f; --accent-soft:#e3eef0;
  --ok:#2e7d5b; --ok-soft:#e2f0e9;
  --warn:#b5761a; --warn-soft:#f6ecd9;
  --danger:#b4453c; --danger-soft:#f4e0dd;
  --radius:12px; --radius-sm:8px; --radius-lg:14px; --radius-pill:999px;
  --shadow:0 1px 2px rgba(31,42,51,.06),0 8px 24px rgba(31,42,51,.06);
  --shadow-hover:0 6px 18px rgba(23,40,58,.08);
  --wrap:1040px; --wrap-narrow:760px;
  --font:"PingFang TC","Noto Sans TC","Microsoft JhengHei",-apple-system,system-ui,sans-serif;
  /* 圖表色盤（六項檢查通過，光模式 surface #fff）：類別固定順序、不循環 */
  --c1:#0e8aa6; --c2:#d0762a; --c3:#9155c9; --c4:#cc4f6d; --c5:#476cd6; --c-other:#6b7683;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--font);color:var(--text);background:var(--bg);line-height:1.6;
  font-size:15px;-webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums;
  word-break:break-word;overflow-wrap:anywhere}
.wrap{max-width:var(--wrap);margin:0 auto;padding:22px 16px 96px}
.eyebrow{font-size:12px;letter-spacing:.16em;color:var(--accent);font-weight:700;text-transform:uppercase}
h1{font-size:27px;font-weight:800;letter-spacing:-.01em;margin:6px 0 8px;color:var(--ink)}
h2{font-size:16px;font-weight:800;color:var(--ink);margin:0 0 4px}
.lede{font-size:14.5px;color:var(--muted);max-width:46ch;line-height:1.6}
.hint{color:var(--muted);font-size:13px;margin:0 0 16px}
.muted{color:var(--muted)}
a{color:var(--accent)}
header.app{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;
  padding:6px 2px 16px;border-bottom:2px solid var(--ink);margin-bottom:14px}
header.app h1{font-size:22px;letter-spacing:.5px;margin:0}
header.app .sub{color:var(--muted);font-size:13px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 18px}
.tab{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--muted);
  padding:9px 15px;border-radius:var(--radius-pill);cursor:pointer;font-size:15px;
  font-weight:700;transition:all .15s;font-family:inherit}
.tab:hover{border-color:var(--accent);color:var(--accent)}
.tab.active{background:var(--ink);color:#fff;border-color:var(--ink)}
button.btn,.btn{font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;
  border:1px solid var(--ink);background:var(--ink);color:#fff;padding:10px 18px;
  border-radius:var(--radius-sm);transition:all .15s}
.btn:hover{opacity:.9}
.btn.ghost{background:#fff;color:var(--ink)}
.btn.accent{background:var(--accent);border-color:var(--accent)}
.btn.ok{background:var(--ok);border-color:var(--ok)}
.btn.warn{background:#fff;border-color:var(--warn);color:var(--warn)}
.btn.danger{background:#fff;border-color:var(--danger);color:var(--danger)}
.btn.lg{font-size:17px;padding:13px 26px}
.btn.sm{font-size:14px;padding:6px 12px}
button.icon,.icon{border:1px solid var(--line);background:#fff;color:var(--muted);
  border-radius:6px;cursor:pointer;padding:4px 9px;font-size:13px;font-family:inherit;transition:all .12s}
.icon:hover{border-color:var(--accent);color:var(--accent)}
.icon.danger:hover{border-color:var(--danger);color:var(--danger)}
.icon.confirm{border-color:var(--danger);color:#fff;background:var(--danger)}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
label.field{display:flex;flex-direction:column;gap:5px;font-size:13px;color:var(--muted);font-weight:600}
input[type=text],input[type=date],input[type=number],input[type=month],input[type=time],input[type=url],select,textarea{
  font-family:inherit;font-size:15px;color:var(--text);border:1px solid var(--line);
  border-radius:var(--radius-sm);padding:9px 11px;background:#fff;min-width:120px;max-width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
textarea{min-width:280px;min-height:90px;resize:vertical;line-height:1.5}
.switch{display:inline-flex;align-items:center;gap:7px;font-size:14px;color:var(--muted);font-weight:600;cursor:pointer}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
th{font-size:12px;color:var(--muted);font-weight:700}
.chip{display:inline-block;padding:2px 9px;border-radius:var(--radius-pill);font-size:12px;
  font-weight:600;background:var(--bg);color:var(--muted);border:1px solid var(--line);margin:2px 3px 2px 0}
.chip.cls{background:var(--accent-soft);color:var(--accent);border-color:transparent}
.chip.btnchip{cursor:pointer}
.chip.btnchip:hover{border-color:var(--accent);color:var(--accent)}
.badge{display:inline-block;padding:2px 9px;border-radius:6px;font-size:12px;font-weight:700}
.badge.auto{background:var(--accent-soft);color:var(--accent)}
.badge.manual{background:var(--warn-soft);color:var(--warn)}
.badge.none{background:var(--danger-soft);color:var(--danger)}
.badge.okb{background:var(--ok-soft);color:var(--ok)}
.notice{padding:12px 15px;border:1.5px solid #e2b4b4;background:#fdf2f2;border-radius:11px;
  color:#c0392b;font-size:13.5px;line-height:1.7;font-weight:600;margin:0 0 20px}
.dirty{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--warn-soft);
  border:1px solid #e6d3ad;color:#7a5410;border-radius:var(--radius-sm);
  padding:10px 14px;font-size:14px;font-weight:600;margin-bottom:12px}
.empty{color:var(--muted);font-size:14px;padding:12px 2px}
.divider{height:1px;background:var(--line);margin:16px 0}
.kpi{display:flex;gap:22px;flex-wrap:wrap;margin-bottom:10px}
.kpi div b{display:block;font-size:22px;color:var(--ink)}
.kpi div span{font-size:12px;color:var(--muted)}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:var(--ink);
  color:#fff;padding:11px 20px;border-radius:var(--radius-pill);font-size:14px;font-weight:600;
  box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:50}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:560px){.grid{grid-template-columns:1fr}header.app h1{font-size:19px}}
@media print{.tabs,.no-print,header.app .sub{display:none!important}body{background:#fff}
  .card{box-shadow:none;border-color:#ccc}}
/* ============ 本工具追加樣式 ============ */
.item{display:flex;gap:10px;align-items:flex-start;padding:10px 2px;border-bottom:1px solid var(--line)}
.item:last-child{border-bottom:none}
.item .grow{flex:1;min-width:0}
.item .t{font-weight:700;color:var(--ink)}
.item .s{font-size:13px;color:var(--muted)}
.daycard{margin-bottom:14px}
.dayhead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.dayhead b{font-size:15px;color:var(--ink)}
.slotlbl{font-size:12px;font-weight:700;color:var(--accent);margin:8px 0 2px}
.checkline{display:flex;align-items:center;gap:9px;padding:7px 2px;border-bottom:1px dashed var(--line)}
.checkline:last-child{border-bottom:none}
.checkline input[type=checkbox]{width:19px;height:19px;accent-color:var(--accent);flex:none}
.checkline.done .lbl{text-decoration:line-through;color:var(--muted)}
.checkline .lbl{flex:1}
.checkline .qty{width:58px;min-width:58px;padding:4px 7px;font-size:13px}
.packcat{font-size:13px;font-weight:800;color:var(--ink);background:var(--bg);
  padding:5px 10px;border-radius:var(--radius-sm);margin:14px 0 4px}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:13px;margin:8px 0}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
.tooltip{position:fixed;background:var(--ink);color:#fff;font-size:12.5px;padding:6px 10px;
  border-radius:8px;pointer-events:none;z-index:60;display:none;font-weight:600;white-space:nowrap}
.bar:hover,.slice:hover{opacity:.82;cursor:pointer}
.subtabs{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 12px}
.subtab{border:1px solid var(--line);background:#fff;color:var(--muted);padding:6px 12px;
  border-radius:var(--radius-pill);cursor:pointer;font-size:13.5px;font-weight:700;font-family:inherit}
.subtab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.big-add{position:sticky;bottom:14px;display:flex;justify-content:flex-end;pointer-events:none}
.formbox{background:var(--accent-soft);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:14px}
.formbox h2{margin-bottom:8px}
.right{margin-left:auto}
.nowrap{white-space:nowrap}
.money{font-weight:800;color:var(--ink)}
.thumb{width:56px;height:56px;object-fit:cover;border-radius:8px;border:1px solid var(--line);cursor:pointer;background:var(--bg)}
.photowrap{display:inline-block;position:relative;margin:4px 8px 4px 0;vertical-align:top}
.photowrap .x{position:absolute;top:-7px;right:-7px;background:var(--danger);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;line-height:1;padding:0}
.addphoto{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:var(--accent);border:1px dashed var(--accent);border-radius:8px;padding:8px 12px;cursor:pointer;background:var(--accent-soft);vertical-align:top;margin-top:4px}
#imgOverlay{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:80;padding:20px}
#imgOverlay img{max-width:100%;max-height:86vh;border-radius:8px}
</style>
</head>
<body>
<div class="wrap" id="app">
  <header class="app">
    <h1>🧳 出國旅遊小工具</h1>
    <span class="sub">行前規劃 × 旅途隨身 × 回顧結算</span>
    <span class="right muted" id="tripBadge" style="font-size:13px;font-weight:700"></span>
  </header>
  <nav class="tabs" id="tabs"></nav>
  <main id="view"></main>
</div>
<div class="toast" id="toast"></div>
<div class="tooltip" id="tooltip"></div>
<div id="imgOverlay"></div>
<script>
'use strict';
/* ================= 資料層 ================= */
const LS_KEY='travelkit-v1';
const uid=()=> 't'+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4);
const DEFAULT_CATS=['餐飲','甜點','御朱印','交通','住宿','門票','購物','伴手禮','其他'];
/* 每個分類的快速項目（點一下就填入「項目」，免手打）；可在設定自訂 */
const DEFAULT_PRESET_ITEMS={
 '餐飲':['早餐','午餐','晚餐','飲料','咖啡','拉麵','壽司','宵夜'],
 '甜點':['蛋糕','冰淇淋','和菓子','鬆餅','聖代'],
 '御朱印':['御朱印'],
 '交通':['電車','地鐵','JR','新幹線','計程車','巴士','IC卡儲值'],
 '住宿':['住宿','溫泉旅館'],
 '門票':['門票','入場券','展覽'],
 '購物':['藥妝','衣服','電器','超市','扭蛋'],
 '伴手禮':['伴手禮','名產','零食'],
 '其他':['寄物櫃','網卡','雜費']
};
const CHART_COLORS=['#0e8aa6','#d0762a','#9155c9','#cc4f6d','#476cd6'];
const OTHER_COLOR='#6b7683';
const SLOTS=[['morning','上午'],['afternoon','下午'],['evening','晚上']];
/* 打包模板：來自使用者的「出國行李清單 V1」docx（qty=true 表示有「穿一帶＿」數量欄） */
const PACK_TEMPLATE=[
 ['衣物・基本服',[['內衣',1],['內褲',1],['睡衣',0],['睡褲',0],['襪子',1]]],
 ['衣物・外出服',[['T-Shirts',1],['背心',1],['長褲',1],['短褲',1],['薄外套',0],['髒衣服袋子',0]]],
 ['衣物・鞋子及配件',[['拖鞋／涼鞋',0],['運動鞋',0],['皮帶',0],['太陽眼鏡',0],['隱形眼鏡',0],['髮叉',0]]],
 ['盥洗＆化妝保養',[['毛巾',0],['棉花棒',0],['牙線棒',0],['化妝棉',0],['衛生紙',0],['濕紙巾',0],
   ['眼藥水／人工淚液',0],['洗面乳',0],['卸妝油、卸妝棉',0],['化妝用品',0],['化妝水',0],['乳液',0],
   ['防曬',0],['護唇膏',0],['美髮用品（髮捲、油）',0],['梳子',0],['指甲剪',0],['個人常備藥品',0],
   ['暈機藥',0],['綿綿',0],['OK繃',0],['痠痛藥膏',0],['痘痘貼、痘痘藥',0],['酒精',0]]],
 ['證件＆文件',[['護照',0],['機票',0],['護照影本',0],['身分證影本',0],['訂房資料',0],
   ['保險影本（旅平／不便）',0],['備用護照照片（2吋×2）',0]]],
 ['財務',[['錢包（大＆小）',0],['外幣現金',0],['Visa 卡、信用卡',0],['台幣現金',0],['悠遊卡、ICOCA',0]]],
 ['雜物／文具',[['家裡鑰匙',0],['筆記本（印章本）',0],['筆、立可帶',0],['L夾',0],['御朱印帳',0]]],
 ['袋／包',[['摺疊購物袋',0],['摺疊行李袋',0],['密封袋',0],['空的束口袋＆衣物收納袋',0],['手機防水袋',0]]],
 ['洗衣',[['洗衣精',0],['衣架、衣夾',0],['洗衣袋',0],['眼鏡布',0],['裝眼鏡袋子',0]]],
 ['3C 用品',[['手機充電線（＋手錶線）',0],['機上充電 TypeA',0],['USB 插頭',0],['行動電源',0],
   ['延長線',0],['iPad',0],['手錶',0],['網卡',0],['行李秤＋電池',0]]],
 ['其他＆備用',[['雨衣、雨傘',0],['防蚊貼',0],['耳機',0],['涼涼',0],['小型手電筒',0],['水瓶',0]]]
];
const HOME_CHECK_DEFAULT=['寵物安置確認','寵物的食物與水備足','倒垃圾','拔插頭（電器）','額外該收的雜物收好','門窗上鎖','冷氣關閉'];
let store=null;
function load(){
  try{store=JSON.parse(localStorage.getItem(LS_KEY))||null}catch(e){store=null}
  if(!store) store={trips:{},order:[],activeId:null,cats:DEFAULT_CATS.slice()};
  if(!store.cats||!store.cats.length) store.cats=DEFAULT_CATS.slice();
  if(!store.presetItems) store.presetItems=JSON.parse(JSON.stringify(DEFAULT_PRESET_ITEMS));
  if(!store.restockTemplate) store.restockTemplate=['常備藥','面膜','保養品','防曬','隱形眼鏡保養液','喉糖／龍角散','零食','泡麵','咖啡','調味料'];
}
function save(){try{localStorage.setItem(LS_KEY,JSON.stringify(store))}catch(e){toast('⚠️ 儲存失敗：'+e.message)}}
function T(){return store.activeId?store.trips[store.activeId]:null}
function newTrip(name,dest,start,end,memberNames){
  const members=(memberNames||[]).filter(Boolean).map(n=>({id:uid(),name:n,transport:'高鐵',emgContact:'',blood:'',allergy:''}));
  const t={id:uid(),name,dest:dest||'日本',currency:'JPY',start,end,members,
    itin:{},bookings:[],packBuy:[],pack:{},homeCheck:HOME_CHECK_DEFAULT.map(x=>({id:uid(),item:x,done:false})),
    exp:[],rate:{manual:0.21,live:null,liveAt:null,use:'manual'},gifts:[],
    restock:[],
    sim:{buyerId:members[0]?members[0].id:'',rows:[],setup:''},
    qr:[{id:uid(),name:'Visit Japan Web（入境手續）',url:'https://www.vjw.digital.go.jp/',note:'入境前先在網站完成登錄，QR 截圖也放這趟的附件資料夾'}],
    emg:{ins:'',insTel:'',cardLoss:'',notes:''}};
  store.trips[t.id]=t;store.order.push(t.id);store.activeId=t.id;save();return t;
}
function tripDays(t){
  if(!t.start||!t.end)return[];
  const out=[];let d=new Date(t.start+'T00:00:00');const end=new Date(t.end+'T00:00:00');
  let guard=0;
  while(d<=end&&guard<60){out.push(d.toISOString().slice(0,10));d=new Date(d.getTime()+86400000);guard++}
  return out;
}
function rate(t){return t.rate.use==='live'&&t.rate.live?t.rate.live:(t.rate.manual||0)}
function expTWD(t,e){return e.mode==='twd'?(+e.amt||0):Math.round((+e.amt||0)*rate(t))}
function fmt(n){return (Math.round(n)).toLocaleString('zh-TW')}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function today(){return new Date().toISOString().slice(0,10)}
/* ---------- 照片儲存（IndexedDB，可裝很多張；不上傳外部） ---------- */
let _db=null;
function idb(){return new Promise((res,rej)=>{
  if(_db)return res(_db);
  const r=indexedDB.open('travelkit-photos',1);
  r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains('photos'))db.createObjectStore('photos')};
  r.onsuccess=e=>{_db=e.target.result;res(_db)};
  r.onerror=e=>rej(e.target.error||new Error('IndexedDB 打不開'));
})}
function photoPut(id,dataUrl){return idb().then(db=>new Promise((res,rej)=>{
  const tx=db.transaction('photos','readwrite');tx.objectStore('photos').put(dataUrl,id);
  tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error)}))}
function photoGet(id){return idb().then(db=>new Promise((res,rej)=>{
  const tx=db.transaction('photos','readonly');const rq=tx.objectStore('photos').get(id);
  rq.onsuccess=()=>res(rq.result);rq.onerror=()=>rej(rq.error)}))}
function photoDelDB(id){return idb().then(db=>new Promise((res)=>{
  const tx=db.transaction('photos','readwrite');tx.objectStore('photos').delete(id);tx.oncomplete=()=>res()}))}
function photoAll(){return idb().then(db=>new Promise((res)=>{
  const tx=db.transaction('photos','readonly');const out={};const rq=tx.objectStore('photos').openCursor();
  rq.onsuccess=e=>{const c=e.target.result;if(c){out[c.key]=c.value;c.continue()}else res(out)}}))}
function compressImage(file,maxDim,quality){return new Promise((res,rej)=>{
  const reader=new FileReader();
  reader.onerror=()=>rej(new Error('讀不到檔'));
  reader.onload=()=>{const img=new Image();
    img.onerror=()=>rej(new Error('不是有效圖片'));
    img.onload=()=>{let w=img.width,h=img.height;
      if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim}
      else if(h>maxDim){w=Math.round(w*maxDim/h);h=maxDim}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      res(cv.toDataURL('image/jpeg',quality))};
    img.src=reader.result};
  reader.readAsDataURL(file)})}
function photosOf(kind,id){const t=T();const arr=kind==='book'?t.bookings:t.qr;const o=arr.find(x=>x.id===id);if(o&&!o.photos)o.photos=[];return o}
function photoStripHTML(kind,o){
  const pics=(o.photos||[]).map(pid=>
    `<span class="photowrap"><img class="thumb" data-pid="${pid}" alt="附件" onclick="viewPhoto('${pid}')">`+
    `<button class="x" title="刪除" onclick="delPhotoAsk('${kind}','${o.id}','${pid}')">✕</button></span>`).join('');
  return `<div style="margin-top:8px">${pics}<label class="addphoto">📷 加照片`+

function del2(btn,fn){ /* 兩段式刪除：第一次點變紅要求確認，3 秒內再點才執行 */
  if(pendingDel&&pendingDel.btn===btn){clearTimeout(pendingDel.t);pendingDel=null;fn();return}

function fetchRate(){

  toast('抓取中…');
  fetch('https://open.er-api.com/v6/latest/'+t.currency).then(r=>r.json()).then(j=>{
    if(j&&j.rates&&j.rates.TWD){t.rate.live=Math.round(j.rates.TWD*10000)/10000;
      t.rate.liveAt=today();t.rate.use='live';save();render();toast('即時匯率已更新：'+t.rate.live)}
    else toast('回應格式不對，改用手動匯率吧');

function settle(t){
  const net={};t.members.forEach(m=>net[m.id]=0);
  t.exp.forEach(e=>{
    const twd=expTWD(t,e),parts=e.parts.filter(p=>net[p]!==undefined);
    if(!parts.length)return;
    const share=twd/parts.length;
    if(net[e.payer]!==undefined)net[e.payer]+=twd;
    parts.forEach(p=>net[p]-=share);
  });
  const debt=[],cred=[];
  Object.entries(net).forEach(([id,v])=>{if(v<-1)debt.push({id,v:-v});if(v>1)cred.push({id,v})});
  debt.sort((a,b)=>b.v-a.v);cred.sort((a,b)=>b.v-a.v);
  const moves=[];let i=0,j=0;
  while(i<debt.length&&j<cred.length){
    const x=Math.min(debt[i].v,cred[j].v);
    moves.push({from:debt[i].id,to:cred[j].id,amt:x});
    debt[i].v-=x;cred[j].v-=x;
    if(debt[i].v<1)i++;if(cred[j].v<1)j++;
  }
  return{net,moves};
}
function settleHTML(t){
  if(!t.exp.length)return'<p class="empty">有帳目後這裡會自動算。</p>';
  const{net,moves}=settle(t);
  let html=`<div class="tbl-scroll"><table><tr><th>成員</th><th>先墊了</th><th>應分攤</th><th>淨額</th></tr>`;
  t.members.forEach(m=>{
    const paid=t.exp.filter(e=>e.payer===m.id).reduce((s,e)=>s+expTWD(t,e),0);
    const owed=paid-net[m.id];
    html+=`<tr><td>${esc(m.name)}</td><td>NT$ ${fmt(paid)}</td><td>NT$ ${fmt(owed)}</td>
      <td class="money" style="color:${net[m.id]>=0?'var(--ok)':'var(--danger)'}">${net[m.id]>=0?'+':''}${fmt(net[m.id])}</td></tr>`;
  });
  html+=`</table></div><div class="divider"></div>`;
  html+=moves.length?moves.map(mv=>{
    const f=t.members.find(m=>m.id===mv.from),to=t.members.find(m=>m.id===mv.to);
    return `<div class="item"><div class="grow"><b>${f?esc(f.name):'?'}</b> → 給 → <b>${to?esc(to.name):'?'}</b>
      <span class="money">NT$ ${fmt(mv.amt)}</span></div></div>`;
  }).join(''):'<p class="empty">目前剛好平，不用互相給錢。</p>';
  return html;
}

let statTable=false;
function vStat(){
  const t=T();
  if(!t.exp.length)return`<div class="card empty">有帳目之後，這裡會有每日花費、分類佔比與每人結算。</div>`;
  const total=t.exp.reduce((s,e)=>s+expTWD(t,e),0);
  const byDay={},byCat={};
  tripDays(t).forEach(d=>byDay[d]=0);
  t.exp.forEach(e=>{byDay[e.date]=(byDay[e.date]||0)+expTWD(t,e);
    byCat[e.cat]=(byCat[e.cat]||0)+expTWD(t,e)});
  const days=Object.keys(byDay).sort();
  const catRows=store.cats.filter(c=>byCat[c]).map(c=>({cat:c,v:byCat[c]}));
  Object.keys(byCat).filter(c=>!store.cats.includes(c)).forEach(c=>catRows.push({cat:c,v:byCat[c]}));
  let html=`<div class="card"><div class="kpi">
    <div><b>NT$ ${fmt(total)}</b><span>總花費</span></div>
    <div><b>NT$ ${fmt(total/Math.max(1,t.members.length))}</b><span>人均</span></div>
    <div><b>NT$ ${fmt(total/Math.max(1,days.filter(d=>byDay[d]>0).length||1))}</b><span>有消費日的日均</span></div></div>
    <label class="switch no-print"><input type="checkbox" ${statTable?'checked':''} onchange="statTable=this.checked;render()"> 用表格看（替代圖表）</label></div>`;
  /* 每日長條 */
  html+=`<div class="card"><h2>每日花費（台幣）</h2>`;
  if(statTable){
    html+=`<div class="tbl-scroll"><table><tr><th>日期</th><th>花費</th></tr>${days.map(d=>
      `<tr><td>${d.slice(5)}</td><td class="money">NT$ ${fmt(byDay[d])}</td></tr>`).join('')}</table></div>`;
  }else{
    const PAD=46,w=Math.max(320,days.length*56+PAD),h=180,max=Math.max(...days.map(d=>byDay[d]),1);
    const maxDay=days.reduce((a,b)=>byDay[a]>=byDay[b]?a:b);
    html+=`<div class="tbl-scroll"><svg viewBox="0 0 ${w} ${h+34}" width="${w}" style="max-width:100%" role="img" aria-label="每日花費長條圖">`;
    [0.5,1].forEach(f=>{const y=h-h*f+10;
      html+=`<line x1="${PAD-6}" y1="${y}" x2="${w}" y2="${y}" stroke="#dbe1df" stroke-width="1"/>
      <text x="${PAD-9}" y="${y+3}" font-size="10" fill="#6b7683" text-anchor="end">${fmt(max*f)}</text>`});
    days.forEach((d,i)=>{
      const bh=Math.max(byDay[d]/max*h,byDay[d]>0?3:0),x=i*56+PAD,y=h-bh+10;
      html+=`<path class="bar" d="M${x},${h+10} L${x},${y+4} Q${x},${y} ${x+4},${y} L${x+20},${y} Q${x+24},${y} ${x+24},${y+4} L${x+24},${h+10} Z"
        fill="#0e8aa6" data-tip="${d.slice(5)}：NT$ ${fmt(byDay[d])}"/>`;
      if(d===maxDay&&byDay[d]>0){ /* 直標：夠高就放長條內（白字），太矮放上方 */
        html+=bh>26?`<text x="${x+12}" y="${y+15}" font-size="10.5" font-weight="700" fill="#fff" text-anchor="middle">${fmt(byDay[d])}</text>`
          :`<text x="${x+12}" y="${y-5}" font-size="10.5" font-weight="700" fill="#2a3340" text-anchor="middle">${fmt(byDay[d])}</text>`;}
      html+=`<text x="${x+12}" y="${h+24}" font-size="10" fill="#6b7683" text-anchor="middle">${d.slice(5)}</text>`;
    });
    html+=`</svg></div>`;
  }
  html+=`</div>`;
  /* 分類甜甜圈 */
  html+=`<div class="card"><h2>分類佔比</h2>`;
  if(statTable){
    html+=`<div class="tbl-scroll"><table><tr><th>分類</th><th>金額</th><th>佔比</th></tr>${catRows.map(r=>
      `<tr><td>${esc(r.cat)}</td><td class="money">NT$ ${fmt(r.v)}</td><td>${Math.round(r.v/total*100)}%</td></tr>`).join('')}</table></div>`;
  }else{
    const R=62,cx=90,cy=90;let a0=-Math.PI/2;
    html+=`<div style="display:flex;gap:18px;flex-wrap:wrap;align-items:center"><svg viewBox="0 0 180 180" width="180" role="img" aria-label="分類佔比甜甜圈圖">`;
    catRows.forEach(r=>{
      const frac=r.v/total,a1=a0+frac*2*Math.PI;
      const large=frac>0.5?1:0;
      const x0=cx+R*Math.cos(a0),y0=cy+R*Math.sin(a0),x1=cx+R*Math.cos(a1),y1=cy+R*Math.sin(a1);
      html+=`<path class="slice" d="M${cx},${cy} L${x0},${y0} A${R},${R} 0 ${large} 1 ${x1},${y1} Z"
        fill="${catColor(r.cat)}" stroke="#fff" stroke-width="2" data-tip="${esc(r.cat)}：NT$ ${fmt(r.v)}（${Math.round(frac*100)}%）"/>`;
      a0=a1;
    });
    html+=`<circle cx="${cx}" cy="${cy}" r="34" fill="#fff"/>
      <text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="11" fill="#6b7683">總計</text>
      <text x="${cx}" y="${cy+15}" text-anchor="middle" font-size="13" font-weight="800" fill="#1f2a33">${fmt(total)}</text></svg>`;
    html+=`<div class="legend" style="flex-direction:column;align-items:flex-start">`+catRows.map(r=>
      `<span><i style="background:${catColor(r.cat)}"></i>${esc(r.cat)}　<b>NT$ ${fmt(r.v)}</b>　<span class="muted">${Math.round(r.v/total*100)}%</span></span>`).join('')+`</div></div>`;
  }
  html+=`</div>`;
  html+=`<div class="card"><h2>每人結算</h2>${settleHTML(t)}</div>`;
  html+=`<div class="card no-print"><h2>📤 分享／匯出</h2><div class="row">
    <label class="switch"><input type="checkbox" id="shareMoney"> 分享頁包含記帳與統計</label>
    <button class="btn accent sm" onclick="exportShare()">產生唯讀分享頁（HTML）</button></div>
    <p class="hint" style="margin-top:6px">產生的檔案傳 LINE 群組或放雲端即可；預設只有行程＋訂票住宿，勾了才含錢的部分。</p></div>`;
  return html;
}

function memDel(id){const t=T();t.members=t.members.filter(m=>m.id!==id);delete t.pack[id];save();render()}
function catAdd(){const v=document.getElementById('ncCat').value.trim();if(!v||store.cats.includes(v))return;
  store.cats.push(v);if(!store.presetItems[v])store.presetItems[v]=[];save();render()}
function catDel(i){store.cats.splice(i,1);save();render()}
function presetAdd(ci){const c=store.cats[ci],el=document.getElementById('np-'+ci),v=el.value.trim();if(!v)return;
  if(!store.presetItems[c])store.presetItems[c]=[];
  if(!store.presetItems[c].includes(v))store.presetItems[c].push(v);save();render()}
function presetDel(ci,i){const c=store.cats[ci];if(store.presetItems[c])store.presetItems[c].splice(i,1);save();render()}
function rtplAdd(){const v=document.getElementById('rtplNew').value.trim();if(!v||store.restockTemplate.includes(v))return;store.restockTemplate.push(v);save();render()}
function rtplDel(i){store.restockTemplate.splice(i,1);save();render()}
async function exportJSON(){
  toast('打包中（含照片）…');
  let photos={};try{photos=await photoAll()}catch(e){}
  const blob=new Blob([JSON.stringify({_v:'travelkit-backup-1',store,photos})],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='travelkit-backup-'+today()+'.json';a.click();toast('已匯出備份（含照片）');
}
function importJSON(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async()=>{try{const j=JSON.parse(r.result);
    let s,photos;
    if(j.store&&j.photos!==undefined){s=j.store;photos=j.photos||{}}       /* 新格式：含照片 */
    else if(j.trips&&j.order){s=j;photos={}}                               /* 舊格式：純資料 */
    else throw new Error('不是本工具的備份檔');
    store=s;save();
    for(const [pid,d] of Object.entries(photos)){try{await photoPut(pid,d)}catch(e){}}
    render();toast('已還原備份'+(Object.keys(photos).length?'（含照片）':''))}
    catch(e){toast('匯入失敗：'+e.message)}};
  r.readAsText(f);
}
/* ================= 分享頁匯出 ================= */
function exportShare(){
  const t=T(),withMoney=document.getElementById('shareMoney').checked;
  const days=tripDays(t);
  let body=`<h1>🧳 ${esc(t.name)}</h1><p class="lede">${esc(t.dest)}｜${t.start} ～ ${t.end}｜成員：${t.members.map(m=>esc(m.name)).join('、')}</p>`;
  body+=`<div class="card"><h2>行程</h2>`;
  days.forEach((d,i)=>{
    body+=`<div class="dayhead" style="margin-top:10px"><b>Day ${i+1}｜${d}</b>${(t.itin[d]||[]).length?'':'<span class="badge manual">待規劃</span>'}</div>`;
    body+=itinDayHTML(t,d,false);
  });
  body+=`</div><div class="card"><h2>訂票＆住宿</h2>`;
  t.bookings.forEach(b=>{body+=`<div class="item"><div class="grow"><div class="t">${esc(b.title)}（${b.status}）</div>
    <div class="s">${b.date?esc(b.date)+'　':''}${b.conf?'編號 '+esc(b.conf)+'　':''}${b.addr?esc(b.addr):''}
    ${b.addrL?'<br>當地語：'+esc(b.addrL):''}</div></div></div>`});
  body+=`</div>`;
  if(withMoney){
    const total=t.exp.reduce((s,e)=>s+expTWD(t,e),0);
    body+=`<div class="card"><h2>花費與結算</h2><p>總花費 <b>NT$ ${fmt(total)}</b></p>${settleHTML(t)}</div>`;
  }
  const css=document.querySelector('style').textContent;
  const html=`<!DOCTYPE html><html lang="zh-Hant-TW"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1"><title>${esc(t.name)}｜行程分享</title>
<style>${css}</style></head><body><div class="wrap">${body}
<p class="hint">此為唯讀分享頁，由「出國旅遊小工具」產生（${today()}）。</p></div></body></html>`;
  const blob=new Blob([html],{type:'text/html'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`${t.name}-分享頁.html`;a.click();toast('分享頁已產生，傳給同行的人吧');
}
